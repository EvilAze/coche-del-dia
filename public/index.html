      Favicons en orden de preferencia para los distintos consumidores:
        - favicon.ico (legacy, fallback universal Windows / IE / antiguos)

      (que usa raster) y simplifica la matriz de iconos.

      tras este cambio. Si lo vuelves a cambiar, sube a v=5.
    -->
